name: CI (Windows x64 Only)

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  PROJECT_NAME: "rustdesk" # 프로젝트 이름에 맞게 수정될 수 있음

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"

jobs:
  build:
    name: Windows x64 MSVC
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }

    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          ./vcpkg/vcpkg install --x-install-root="./vcpkg/installed"
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.job.target }}

      - name: Show version information
        shell: bash
        run: |
          rustc -V
          cargo -V

      - uses: Swatinem/rust-cache@v2

      - name: Build (Release)
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target=${{ matrix.job.target }}

      # 빌드된 결과물을 한 곳으로 모으기 (업로드 용도)
      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p ./output
          cp target/${{ matrix.job.target }}/release/*.exe ./output/ || true

      # GitHub Actions 결과창에서 다운로드 가능하게 업로드
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: ./output/*.exe

      # 테스트는 선택 사항 (빌드 시간 단축을 위해 주석 처리 가능)
      # - name: Run tests
      #   uses: actions-rs/cargo@v1
      #   with:
      #     command: test
      #     args: --release --target=${{ matrix.job.target }}
      
